<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <title>Battleship</title>
  </head>
  <body>
    <nav>
      <h1 class="main-title">BATTLESHIP: COMMAND</h1>
    </nav>

    <section class="main-section">
      <div class="gameboard-wrapper">
        <div class="playerone-gameboard-wrapper">
          <div class="playerone-grid"></div>
          <div class="ship-layer-pleyerone"></div>
          <div class="playerone-fleet-container"></div>
        </div>
        <div class="vs-wrapper">
          <span class="line one"></span>
          <p class="vs">VS</p>
          <span class="line two"></span>
        </div>
        <div class="playertwo-gameboard-wrapper">
          <div class="playertwo-grid"></div>
          <div class="ship-layer-pleyertwo"></div>
          <div class="playertwo-fleet-container"></div>
        </div>
      </div>
    </section>

    <section class="fleet-section">
      <div class="vs-wrapper">
        <span class=""></span>
        <p></p>
        <span class=""></span>
      </div>
    </section>
    <div class="tint">
      <section class="initial-screen">
        <form action="#" class="form">
          <h1 class="title">BATTLESHIP: <span>COMMAND</span></h1>
          <p class="strategic-protocol">
            INITIALIZE STRATEGIC NAVAL ENGAGEMENT PROTOCOL
          </p>
          <div class="gameplay-mode-selection">
            <button id="p-vs-p" class="selected">PLAYER VS PLAYER</button>
            <button id="p-vs-c">PLAYER VS COMPUTER</button>
          </div>
          <div class="player-name-input-container">
            <div class="player-one-input-wrapper">
              <label class="player-one-input-lable" for="player-one-input"
                >COMMANDING OFFICER 01</label
              >
              <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input
                  id="player-one-input"
                  type="text"
                  placeholder="ENTER CALLSIGN"
                  name="player-one-input"
                />
              </div>
            </div>
            <div class="player-two-input-wrapper">
              <label class="player-two-input-lable" for="player-two-input"
                >COMMANDING OFFICER 02</label
              >
              <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input
                  id="player-two-input"
                  type="text"
                  placeholder="ENTER CALLSIGN"
                  name="player-two-input"
                />
              </div>
            </div>
          </div>
          <div class="button-wrapper">
            <button id="submit-btn"><span>𖣠</span>START MISSION</button>
          </div>
        </form>
      </section>
    </div>
  </body>
</html>
